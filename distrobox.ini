[dlt-dev]
image=fedora-toolbox:latest
entry=false

additional_packages=git golang
init_hooks=go install github.com/gohugoio/hugo@v0.111.3

pre_init_hooks=export SHELL=/bin/fish
additional_packages=fish

pre_init_hooks=dnf copr enable -y atim/starship
additional_packages=starship

additional_packages=neovim
init_hooks=alternatives --install /usr/bin/vim vim /usr/bin/nvim 100

pre_init_hooks=dnf copr enable -y dejan/lazygit
additional_packages=lazygit

init_hooks=go install github.com/jesseduffield/lazydocker@latest

additional_packages=btop zoxide bat ripgrep fd-find direnv
